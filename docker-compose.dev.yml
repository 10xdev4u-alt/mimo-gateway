version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      - APP_PORT=4200
      - DATABASE_URL=postgres://grit:grit@localhost:5434/mimo_gateway?sslmode=disable
      - REDIS_URL=redis://localhost:6380
      - JWT_SECRET=dev-secret-change-in-production
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: grit
      POSTGRES_PASSWORD: grit
      POSTGRES_DB: mimo_gateway

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
